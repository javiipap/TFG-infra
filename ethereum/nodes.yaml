# Remaining nodes (worker02-08) — connect to bootnode
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ethereum-node
  namespace: ethereum
spec:
  selector:
    matchLabels:
      app: ethereum-node
      role: peer
  template:
    metadata:
      labels:
        app: ethereum-node
        role: peer
      annotations:
        signoz.io/scrape: "true"
        signoz.io/port: "6060"
        signoz.io/scheme: "http"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: ethereum-role
                    operator: NotIn
                    values: ["bootnode"]
      initContainers:
        - name: init-genesis
          image: busybox
          command: ['/bin/sh', '-c']
          args:
            - |
              cp /genesis-cm/genesis.json /genesis/genesis.json
              cp /genesis-cm/config.yaml /genesis/config.yaml
              cp /genesis-cm/deposit_contract.txt /genesis/deposit_contract.txt
              cp /genesis-cm/deposit_contract_block.txt /genesis/deposit_contract_block.txt
              cp /genesis-cm/deposit_contract_block_hash.txt /genesis/deposit_contract_block_hash.txt
              cp /genesis-cm/genesis_validators_root.txt /genesis/genesis_validators_root.txt
              gunzip -c /genesis-cm/genesis.ssz.gz > /genesis/genesis.ssz
              echo "" > /genesis/bootstrap_nodes.txt
          volumeMounts:
            - name: genesis-cm
              mountPath: /genesis-cm
            - name: genesis
              mountPath: /genesis
        - name: init-geth
          image: e3vote-cp.iaas.ull.es:8080/custom-geth:latest
          command: ['/bin/sh', '-c']
          args:
            - |
              if [ ! -d /data/geth/geth/chaindata ]; then
                geth init --datadir=/data/geth /genesis/genesis.json
              else
                echo "Geth already initialized, skipping"
              fi
          volumeMounts:
            - name: geth-data
              mountPath: /data/geth
            - name: genesis
              mountPath: /genesis
        - name: init-bootnode
          image: curlimages/curl
          securityContext:
            runAsUser: 0
          command: ['/bin/sh', '-c']
          args:
            - |
              echo "Waiting for bootnode..."
              until curl -sf http://ethereum-bootnode.ethereum.svc.cluster.local:3500/eth/v1/node/identity > /tmp/identity.json 2>/dev/null; do
                sleep 5
              done
              ENR=$(cat /tmp/identity.json | grep -o '"enr":"[^"]*"' | cut -d'"' -f4)

              until curl -sf -X POST -H "Content-Type: application/json" \
                -d '{"jsonrpc":"2.0","method":"admin_nodeInfo","params":[],"id":1}' \
                http://ethereum-bootnode.ethereum.svc.cluster.local:8545 > /tmp/nodeinfo.json 2>/dev/null; do
                sleep 5
              done
              BOOTNODE_IP=$(cat /tmp/identity.json | grep -o '"p2p_addresses":\["[^"]*"' | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+\.[0-9]\+')
              ENODE=$(cat /tmp/nodeinfo.json | grep -o '"enode":"[^"]*"' | cut -d'"' -f4 | sed "s|@[^:]*:|@${BOOTNODE_IP}:|")

              # Write bootnode info for geth (shell wrapper reads this)
              echo "$ENODE" > /shared/bootnode-enode

              # Write ENR into bootstrap_nodes.txt so prysm reads it natively
              echo "$ENR" > /genesis/bootstrap_nodes.txt

              # Derive validator index from node name
              IDX=$(echo $NODE_NAME | grep -o '[0-9]*$' | sed 's/^0*//')
              VAL=$((IDX - 1))
              echo "$VAL" > /shared/validator-index

              echo "ENR: $ENR"
              echo "enode: $ENODE"
              echo "validator index: $VAL"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: genesis
              mountPath: /genesis
        # Create wrapper scripts for prysm (distroless images have no shell)
        - name: init-wrapper
          image: busybox:musl
          command: ['/bin/sh', '-c']
          args:
            - |
              VAL=$(cat /shared/validator-index)

              # Beacon wrapper
              cat > /wrapper/beacon << EOF
              #!/bin/busybox sh
              exec /app/cmd/beacon-chain/beacon-chain "\$@"
              EOF
              chmod +x /wrapper/beacon

              # Validator wrapper
              cat > /wrapper/validator << EOF
              #!/bin/busybox sh
              exec /app/cmd/validator/validator "\$@"
              EOF
              chmod +x /wrapper/validator

              # Write validator index as a flag file
              echo "$VAL" > /wrapper/val-index

              # Copy statically-linked busybox for use in distroless containers
              cp /bin/busybox /wrapper/busybox
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: wrapper
              mountPath: /wrapper
      containers:
        - name: geth
          image: e3vote-cp.iaas.ull.es:8080/custom-geth:latest
          command: ['/bin/sh', '-c']
          args:
            - |
              exec geth \
                --datadir=/data/geth \
                --networkid=32382 \
                --http --http.addr=0.0.0.0 --http.port=8545 \
                --http.api=eth,net,web3,txpool,admin \
                --http.corsdomain=* --http.vhosts=* \
                --ws --ws.addr=0.0.0.0 --ws.port=8546 \
                --ws.api=eth,net,web3,txpool --ws.origins=* \
                --authrpc.addr=0.0.0.0 --authrpc.port=8551 \
                --authrpc.jwtsecret=/jwt/jwtsecret --authrpc.vhosts=* \
                --syncmode=full \
                --miner.gasprice=0 \
                --txpool.pricelimit=0 \
                --port=30303 --discovery.port=30303 \
                --nat=extip:${POD_IP} \
                --metrics --metrics.addr=0.0.0.0 --metrics.port=6060 \
                --bootnodes=$(cat /shared/bootnode-enode)
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 8545
            - containerPort: 8546
            - containerPort: 30303
              protocol: TCP
            - containerPort: 30303
              protocol: UDP
            - containerPort: 6060
              name: geth-metrics
          volumeMounts:
            - name: geth-data
              mountPath: /data/geth
            - name: jwt
              mountPath: /jwt
              readOnly: true
            - name: shared
              mountPath: /shared
              readOnly: true
        - name: prysm-beacon
          image: gcr.io/prysmaticlabs/prysm/beacon-chain:latest
          command: ['/wrapper/busybox', 'sh', '-c']
          args:
            - |
              ENR=$(cat /genesis/bootstrap_nodes.txt)
              exec /app/cmd/beacon-chain/beacon-chain \
                --datadir=/data/prysm \
                --genesis-state=/genesis/genesis.ssz \
                --chain-config-file=/genesis/config.yaml \
                --execution-endpoint=http://localhost:8551 \
                --jwt-secret=/jwt/jwtsecret \
                --contract-deployment-block=0 \
                --chain-id=32382 \
                --accept-terms-of-use \
                --rpc-host=0.0.0.0 --rpc-port=4000 \
                --grpc-gateway-host=0.0.0.0 --grpc-gateway-port=3500 \
                --p2p-tcp-port=13000 --p2p-udp-port=12000 \
                --min-sync-peers=0 \
                --interop-eth1data-votes \
                --suggested-fee-recipient=0xf97e180c050e5Ab072211Ad2C213Eb5AEE4DF134 \
                --minimum-peers-per-subnet=0 \
                --monitoring-host=0.0.0.0 --monitoring-port=6061 \
                --bootstrap-node=$ENR
          ports:
            - containerPort: 4000
            - containerPort: 3500
            - containerPort: 13000
              protocol: TCP
            - containerPort: 12000
              protocol: UDP
            - containerPort: 6061
              name: beacon-metrics
          volumeMounts:
            - name: prysm-data
              mountPath: /data/prysm
            - name: genesis
              mountPath: /genesis
            - name: jwt
              mountPath: /jwt
              readOnly: true
            - name: wrapper
              mountPath: /wrapper
              readOnly: true
        - name: prysm-validator
          image: gcr.io/prysmaticlabs/prysm/validator:latest
          command: ['/wrapper/busybox', 'sh', '-c']
          args:
            - |
              VAL=$(cat /wrapper/val-index)
              exec /app/cmd/validator/validator \
                --datadir=/data/prysm-validator \
                --beacon-rpc-provider=localhost:4000 \
                --accept-terms-of-use \
                --interop-num-validators=1 \
                --interop-start-index=$VAL \
                --chain-config-file=/genesis/config.yaml \
                --suggested-fee-recipient=0xf97e180c050e5Ab072211Ad2C213Eb5AEE4DF134 \
                --monitoring-host=0.0.0.0 --monitoring-port=6062
          ports:
            - containerPort: 6062
              name: val-metrics
          volumeMounts:
            - name: prysm-validator-data
              mountPath: /data/prysm-validator
            - name: genesis
              mountPath: /genesis
            - name: shared
              mountPath: /shared
              readOnly: true
            - name: wrapper
              mountPath: /wrapper
              readOnly: true
      volumes:
        - name: genesis-cm
          configMap:
            name: ethereum-genesis
        - name: genesis
          emptyDir: {}
        - name: jwt
          secret:
            secretName: ethereum-jwt
        - name: geth-data
          emptyDir: {}
        - name: prysm-data
          emptyDir: {}
        - name: prysm-validator-data
          emptyDir: {}
        - name: shared
          emptyDir: {}
        - name: wrapper
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ethereum-rpc
  namespace: ethereum
spec:
  type: NodePort
  selector:
    app: ethereum-node
  ports:
    - name: http-rpc
      port: 8545
      targetPort: 8545
      nodePort: 30545
    - name: ws-rpc
      port: 8546
      targetPort: 8546
      nodePort: 30546
