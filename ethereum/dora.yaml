# ClusterIP service for Prysm beacon HTTP API (used by Dora)
apiVersion: v1
kind: Service
metadata:
  name: ethereum-beacon
  namespace: ethereum
spec:
  type: ClusterIP
  selector:
    app: ethereum-node
  ports:
    - name: beacon-api
      port: 3500
      targetPort: 3500
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dora-config
  namespace: ethereum
data:
  config.yaml: |
    logging:
      outputLevel: "info"
    chain:
      configPath: "/genesis/config.yaml"
      displayName: "e3vote Private PoS Network"
    server:
      host: "0.0.0.0"
      port: "8080"
    frontend:
      enabled: true
      siteName: "e3vote Explorer"
      siteSubtitle: "Private PoS Testnet"
      showSensitivePeerInfos: true
    beaconapi:
      endpoints:
        - name: "prysm"
          url: "http://ethereum-beacon.ethereum.svc.cluster.local:3500"
          priority: 1
          archive: true
    executionapi:
      endpoints:
        - name: "geth"
          url: "http://ethereum-rpc.ethereum.svc.cluster.local:8545"
      depositDeployBlock: 0
    indexer:
      inMemoryEpochs: 8
      disableSynchronizer: false
    database:
      engine: "sqlite"
      sqlite:
        file: "/data/dora.sqlite"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dora
  namespace: ethereum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dora
  template:
    metadata:
      labels:
        app: dora
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
        - name: dora
          image: ethpandaops/dora:latest
          args: ["-config", "/config/config.yaml"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: genesis
              mountPath: /genesis
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: dora-config
        - name: genesis
          configMap:
            name: ethereum-genesis
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dora
  namespace: ethereum
spec:
  type: NodePort
  selector:
    app: dora
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 8081
